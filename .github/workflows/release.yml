name: Release

on:
  push:
    tags:
      - 'v*'

env:
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
  ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build & Release (windows-latest)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - run: npm install -g pnpm@9

      - run: pnpm install --frozen-lockfile

      - name: Build & Package
        shell: bash
        run: |
          pnpm build
          pnpm build:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wubi-typemaster-windows-latest
          path: release/**/*
          retention-days: 30

  build-ubuntu:
    name: Build & Release (ubuntu-latest)
    runs-on: ubuntu-latest
    # Continue even if ubuntu fails — Windows release is the priority
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - run: npm install -g pnpm@9

      - run: pnpm install --frozen-lockfile

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev fakeroot libfuse2

      - name: Build & Package
        shell: bash
        run: |
          pnpm build
          pnpm build:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wubi-typemaster-ubuntu-latest
          path: release/**/*
          retention-days: 30

  build-ubuntu-arm64:
    name: Build & Release (ubuntu-24.04-arm)
    runs-on: ubuntu-24.04-arm
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - run: npm install -g pnpm@9

      - run: pnpm install

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev fakeroot libfuse2
          sudo apt-get install -y -qq libx11-xcb1 libxcb-dri3-0 libdrm2 libgbm1 libasound2 || true

      - name: Build & Package (ARM64)
        continue-on-error: true
        shell: bash
        env:
          ELECTRON_MIRROR: ""
          ELECTRON_BUILDER_BINARIES_MIRROR: ""
          NODE_OPTIONS: ""
        run: |
          set +e
          pnpm build 2>&1 | tee /tmp/build.log
          BUILD_OK=${PIPESTATUS[0]}
          ls -la out/ 2>&1 | tee -a /tmp/build.log
          echo "=== Clearing electron-builder cache ===" | tee -a /tmp/build.log
          rm -rf ~/.cache/electron-builder 2>/dev/null
          echo "=== Starting ARM64 packaging (AppImage only) ===" | tee -a /tmp/build.log
          npx electron-builder --linux --arm64 --config.linux.target=AppImage >> /tmp/build.log 2>&1
          EBUILD_OK=$?
          echo "=== BUILD_EXIT_CODE=$BUILD_OK EBUILDER_EXIT_CODE=$EBUILD_OK ===" | tee -a /tmp/build.log
          echo "BUILD_OK=$BUILD_OK" > /tmp/build_exit.txt
          echo "EBUILD_OK=$EBUILD_OK" >> /tmp/build_exit.txt

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-arm64
          path: /tmp/build.log
          retention-days: 90

      - name: Report failure as issue
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          HEAD_SHA="${{ github.sha }}"
          RUN_ID="${{ github.run_id }}"
          {
            echo "### ARM64 Build Failure ($TIMESTAMP)"
            echo ""
            echo "**Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "**SHA**: $HEAD_SHA"
            echo ""
            echo '```'
            head -200 /tmp/build.log 2>/dev/null || echo "Log file not found"
            echo '```'
          } > /tmp/issue_body.md
          gh issue create \
            --title "CI: ARM64 build failed ($TIMESTAMP)" \
            --label "ci-log" \
            --body-file /tmp/issue_body.md \
            --repo "${{ github.repository }}" 2>&1 || echo "Issue creation failed"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wubi-typemaster-ubuntu-arm64
          path: release/**/*
          retention-days: 30

  github-release:
    name: GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Artifact structure ==="
          find dist-artifacts -type f | head -50

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Creating release for ${{ github.ref_name }} ==="

          PRERELEASE="${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}"
          if [ "$PRERELEASE" = "true" ]; then PRERELEASE_FLAG="--prerelease"; else PRERELEASE_FLAG=""; fi

          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            $PRERELEASE_FLAG

          echo "=== Release created. Now uploading assets... ==="

          find dist-artifacts -type f \( -name '*.exe' -o -name '*.exe.blockmap' -o -name '*.nupkg' -o -name 'RELEASES' -o -name 'app-update.yml' -o -name 'latest.yml' -o -name '*.AppImage' -o -name '*.AppImage.blockmap' -o -name '*.deb' -o -name '*.deb.blockmap' -o -name 'latest-linux*.yml' \) -print0 | while IFS= read -r -d '' f; do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done

          echo "=== Release assets uploaded successfully ==="

  mirror-to-gitee:
    name: Mirror to Gitee
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          # URL-encode the token to handle special chars (@, :, /, etc.)
          ENCODED=$(python3 -c "import urllib.parse; import os; print(urllib.parse.quote(os.environ['GITEE_TOKEN'], safe=''))")
          git remote add gitee "https://oauth2:${ENCODED}@gitee.com/benber66/wubi-typemaster.git"
          git push gitee --force --mirror
          git remote remove gitee

      - name: Sync Release assets to Gitee
        run: node scripts/sync-gitee-release.mjs
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
