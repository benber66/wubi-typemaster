name: Release

on:
  push:
    tags:
      - 'v*'

env:
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
  ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build & Release (windows-latest)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - run: npm install -g pnpm@9

      - run: pnpm install --frozen-lockfile

      - name: Build & Package
        shell: bash
        run: |
          pnpm build
          pnpm build:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wubi-typemaster-windows-latest
          path: release/**/*
          retention-days: 30

  build-ubuntu:
    name: Build & Release (ubuntu-latest)
    runs-on: ubuntu-latest
    # Continue even if ubuntu fails — Windows release is the priority
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - run: npm install -g pnpm@9

      - run: pnpm install --frozen-lockfile

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev fakeroot libfuse2

      - name: Build & Package
        shell: bash
        run: |
          pnpm build
          pnpm build:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wubi-typemaster-ubuntu-latest
          path: release/**/*
          retention-days: 30

  github-release:
    name: GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Artifact structure ==="
          find dist-artifacts -type f | head -50

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Creating release for ${{ github.ref_name }} ==="

          PRERELEASE="${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}"
          if [ "$PRERELEASE" = "true" ]; then PRERELEASE_FLAG="--prerelease"; else PRERELEASE_FLAG=""; fi

          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            $PRERELEASE_FLAG

          echo "=== Release created. Now uploading assets... ==="

          find dist-artifacts -type f \( -name '*.exe' -o -name '*.exe.blockmap' -o -name '*.nupkg' -o -name 'RELEASES' -o -name 'app-update.yml' -o -name 'latest.yml' \) -print0 | while IFS= read -r -d '' f; do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done

          echo "=== Release assets uploaded successfully ==="

  mirror-to-gitee:
    name: Mirror to Gitee
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Gitee
        run: |
          git remote add gitee https://benber66:${{ secrets.GITEE_TOKEN }}@gitee.com/benber66/wubi-typemaster.git
          git push gitee --force --mirror
          git remote remove gitee

      - name: Sync Release assets to Gitee
        run: node scripts/sync-gitee-release.mjs
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
