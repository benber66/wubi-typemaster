name: Release

on:
  push:
    tags:
      - 'v*'

env:
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
  ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build & Release (windows-latest)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - run: npm install -g pnpm@9

      - run: pnpm install --frozen-lockfile

      - name: Build & Package
        shell: bash
        run: |
          pnpm build
          pnpm build:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wubi-typemaster-windows-latest
          path: release/**/*
          retention-days: 30

  build-ubuntu:
    name: Build & Release (ubuntu-latest)
    runs-on: ubuntu-latest
    # Continue even if ubuntu fails — Windows release is the priority
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - run: npm install -g pnpm@9

      - run: pnpm install --frozen-lockfile

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev fakeroot libfuse2

      - name: Build & Package
        shell: bash
        run: |
          pnpm build
          pnpm build:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wubi-typemaster-ubuntu-latest
          path: release/**/*
          retention-days: 30

  build-ubuntu-arm64:
    name: Build & Release (ubuntu-24.04-arm)
    runs-on: ubuntu-24.04-arm
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - run: npm install -g pnpm@9

      - run: pnpm install

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev fakeroot libfuse2
          sudo apt-get install -y -qq libx11-xcb1 libxcb-dri3-0 libdrm2 libgbm1 libasound2 || true

      - name: Build & Package (ARM64)
        continue-on-error: true
        shell: bash
        env:
          ELECTRON_MIRROR: ""
          ELECTRON_BUILDER_BINARIES_MIRROR: ""
          NODE_OPTIONS: ""
        run: |
          set +e
          pnpm build 2>&1 | tee /tmp/build.log
          BUILD_OK=${PIPESTATUS[0]}
          ls -la out/ 2>&1 | tee -a /tmp/build.log
          echo "=== Clearing electron-builder cache ===" | tee -a /tmp/build.log
          rm -rf ~/.cache/electron-builder 2>/dev/null
          echo "=== Starting ARM64 packaging (AppImage only) ===" | tee -a /tmp/build.log
          npx electron-builder --linux --arm64 --config.linux.target=AppImage >> /tmp/build.log 2>&1
          EBUILD_OK=$?
          echo "=== BUILD_EXIT_CODE=$BUILD_OK EBUILDER_EXIT_CODE=$EBUILD_OK ===" | tee -a /tmp/build.log
          echo "BUILD_OK=$BUILD_OK" > /tmp/build_exit.txt
          echo "EBUILD_OK=$EBUILD_OK" >> /tmp/build_exit.txt

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-arm64
          path: /tmp/build.log
          retention-days: 90

      - name: Report errors
        if: always()
        shell: bash
        run: |
          LOG=/tmp/build.log
          [ ! -f "$LOG" ] && { echo "::error::No build log found"; exit 0; }
          grep -n -i "error\|Error\|ERROR\|fail\|Fail\|FAIL\|exception\|Exception\|Cannot\|cannot\|not found\|No such\|exit code\|NaN\|EBUILD\|rebuilt\|starting\|task=" "$LOG" 2>/dev/null | tail -50 | while IFS= read -r line; do
            clean=$(echo "$line" | tr -d '\n\r\t' | head -c 600)
            [ -n "$clean" ] && echo "::error::$clean"
          done
          echo "=== last 20 lines ==="
          tail -20 "$LOG" 2>/dev/null | while IFS= read -r line; do
            clean=$(echo "$line" | tr -d '\n\r\t' | head -c 600)
            [ -n "$clean" ] && echo "::error::$clean"
          done

      - name: Upload ARM64 AppImage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wubi-typemaster-ubuntu-arm64
          path: release/**/*.AppImage
          retention-days: 30

      - name: Check build success
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/build_exit.txt ]; then
            source /tmp/build_exit.txt
            [ "$BUILD_OK" = "0" ] && [ "$EBUILD_OK" = "0" ] && exit 0
            echo "BUILD_OK=$BUILD_OK EBUILD_OK=$EBUILD_OK"
            [ "$BUILD_OK" != "0" ] && echo "::error::Vite build failed (exit $BUILD_OK)"
            [ "$EBUILD_OK" != "0" ] && echo "::error::electron-builder failed (exit $EBUILD_OK)"
            exit 1
          fi
          echo "::error::Build exit file not found"
          exit 1

  github-release:
    name: GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Artifact structure ==="
          find dist-artifacts -type f | head -50

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Creating release for ${{ github.ref_name }} ==="

          PRERELEASE="${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}"
          if [ "$PRERELEASE" = "true" ]; then PRERELEASE_FLAG="--prerelease"; else PRERELEASE_FLAG=""; fi

          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            $PRERELEASE_FLAG

          echo "=== Release created. Now uploading assets... ==="

          find dist-artifacts -type f \( -name '*.exe' -o -name '*.exe.blockmap' -o -name '*.nupkg' -o -name 'RELEASES' -o -name 'app-update.yml' -o -name 'latest.yml' -o -name '*.AppImage' -o -name '*.AppImage.blockmap' -o -name '*.deb' -o -name '*.deb.blockmap' -o -name 'latest-linux*.yml' \) -print0 | while IFS= read -r -d '' f; do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done

          echo "=== Release assets uploaded successfully ==="

  mirror-to-gitee:
    name: Mirror to Gitee
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        shell: bash
        run: |
          set -x
          if [ -z "$GITEE_TOKEN" ]; then
            echo "::error::GITEE_TOKEN secret is empty or not set"
            exit 1
          fi
          echo "Token length: ${#GITEE_TOKEN}"
          ENCODED=$(python3 -c "import urllib.parse; import os; print(urllib.parse.quote(os.environ['GITEE_TOKEN'], safe=''))")
          echo "Encoded token length: ${#ENCODED}"
          git remote add gitee "https://oauth2:${ENCODED}@gitee.com/benber66/wubi-typemaster.git"
          git push gitee --force --mirror 2>&1
          GIT_PUSH_EXIT=$?
          git remote remove gitee 2>/dev/null || true
          if [ $GIT_PUSH_EXIT -ne 0 ]; then
            echo "::error::Git push to Gitee failed (exit $GIT_PUSH_EXIT)"
            exit $GIT_PUSH_EXIT
          fi
          echo "::notice::Mirror to Gitee succeeded"

      - name: Sync Release assets to Gitee
        run: node scripts/sync-gitee-release.mjs
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
