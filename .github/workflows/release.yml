name: Release

on:
  push:
    tags:
      - 'v*'

env:
  npm_config_registry: https://registry.npmmirror.com
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
  ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build & Package
        shell: bash
        run: |
          pnpm build
          if [ "$RUNNER_OS" == "Windows" ]; then
            pnpm build:win
          else
            pnpm build:linux
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wubi-typemaster-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.deb
          retention-days: 30

  github-release:
    name: GitHub Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}

  mirror-to-gitee:
    name: Mirror to Gitee
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - name: Mirror repository
        uses: yanglbme/gitee-repo-mirror@main
        with:
          src: https://github.com/benber66/wubi-typemaster.git
          dst: https://gitee.com/benber66/wubi-typemaster.git
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          force: false

      - name: Sync Release assets to Gitee
        run: node scripts/sync-gitee-release.mjs
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
