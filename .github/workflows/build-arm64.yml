name: Build ARM64

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to build'
        required: false
        default: 'main'
        type: string
  push:
    branches:
      - 'ci/arm64/**'

jobs:
  build-arm64:
    name: Build ARM64 (deb + AppImage)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Debug system info
        run: |
          echo "=== System Info ==="
          uname -a
          arch
          node -v
          npm -v
          echo "=== CPU ==="
          cat /proc/cpuinfo | grep "model name" | head -1 || true
          cat /proc/cpuinfo | grep "CPU architecture" | head -1 || true
          echo "=== Memory ==="
          free -h
          echo "=== Disk ==="
          df -h / | tail -1

      - run: npm install -g pnpm@9

      - run: pnpm install

      - name: Rebuild native modules for Electron
        run: |
          npx @electron/rebuild -f -w better-sqlite3

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev fakeroot libfuse2
          sudo apt-get install -y -qq libx11-xcb1 libxcb-dri3-0 libdrm2 libgbm1 libasound2 || true

      - name: Build & Package (ARM64)
        continue-on-error: true
        shell: bash
        env:
          ELECTRON_MIRROR: ""
          ELECTRON_BUILDER_BINARIES_MIRROR: ""
          NODE_OPTIONS: ""
        run: |
          set +e
          pnpm build 2>&1 | tee /tmp/build.log
          BUILD_OK=${PIPESTATUS[0]}
          ls -la out/ 2>&1 | tee -a /tmp/build.log
          echo "=== electron-builder version ===" | tee -a /tmp/build.log
          npx electron-builder --version 2>&1 | tee -a /tmp/build.log
          echo "=== Clearing electron-builder cache (avoid x86 fpm) ===" | tee -a /tmp/build.log
          rm -rf ~/.cache/electron-builder 2>/dev/null
          echo "=== Starting ARM64 packaging (AppImage only — deb requires x86 fpm) ===" | tee -a /tmp/build.log
          npx electron-builder --linux --arm64 --config.linux.target=AppImage >> /tmp/build.log 2>&1
          EBUILD_OK=$?
          echo "=== BUILD_EXIT_CODE=$BUILD_OK EBUILDER_EXIT_CODE=$EBUILD_OK ===" | tee -a /tmp/build.log
          echo "BUILD_OK=$BUILD_OK" > /tmp/build_exit.txt
          echo "EBUILD_OK=$EBUILD_OK" >> /tmp/build_exit.txt

      - name: List built artifacts
        if: always()
        run: |
          echo "=== Built artifacts ==="
          find release -type f 2>/dev/null | sort || echo "No artifacts found"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 90

      - name: Report errors
        if: always()
        shell: bash
        run: |
          LOG=/tmp/build.log
          [ ! -f "$LOG" ] && { echo "::error::No build log found"; exit 0; }
          grep -n -i "error\|Error\|ERROR\|fail\|Fail\|FAIL\|exception\|Exception\|Cannot\|cannot\|not found\|No such\|exit code\|NaN\|EBUILD\|rebuilt\|starting\|task=" "$LOG" 2>/dev/null | tail -50 | while IFS= read -r line; do
            clean=$(echo "$line" | tr -d '\n\r\t' | head -c 600)
            [ -n "$clean" ] && echo "::error::$clean"
          done
          echo "=== last 20 lines ==="
          tail -20 "$LOG" 2>/dev/null | while IFS= read -r line; do
            clean=$(echo "$line" | tr -d '\n\r\t' | head -c 600)
            [ -n "$clean" ] && echo "::error::$clean"
          done

      - name: Upload ARM64 deb
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wubi-typemaster-arm64-deb
          path: release/**/*.deb
          retention-days: 90

      - name: Upload ARM64 AppImage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wubi-typemaster-arm64-appimage
          path: release/**/*.AppImage
          retention-days: 90

      - name: Check build success
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/build_exit.txt ]; then
            source /tmp/build_exit.txt
            [ "$BUILD_OK" = "0" ] && [ "$EBUILD_OK" = "0" ] && exit 0
            echo "BUILD_OK=$BUILD_OK EBUILD_OK=$EBUILD_OK"
            [ "$BUILD_OK" != "0" ] && echo "::error::Vite build failed (exit $BUILD_OK)"
            [ "$EBUILD_OK" != "0" ] && echo "::error::electron-builder failed (exit $EBUILD_OK)"
            exit 1
          fi
          echo "::error::Build exit file not found"
          exit 1
