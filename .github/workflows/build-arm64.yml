name: Build ARM64

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to build'
        required: false
        default: 'main'
        type: string

jobs:
  build-arm64:
    name: Build ARM64 (deb + AppImage)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - run: npm install -g pnpm@9

      - run: pnpm install --frozen-lockfile

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev fakeroot libfuse2 \
            python3 make gcc g++ libx11-xcb1 libxcb-dri3-0 libdrm2 \
            libgbm1 libasound2

      - name: Build & Package (ARM64)
        shell: bash
        run: |
          pnpm build
          echo "--- Packaging for ARM64 ---"
          pnpm build:linux:arm64 --verbose

      - name: List built artifacts
        run: |
          echo "=== Built artifacts ==="
          find release -type f | sort

      - name: Upload ARM64 deb
        uses: actions/upload-artifact@v4
        with:
          name: wubi-typemaster-arm64-deb
          path: release/**/*.deb
          retention-days: 90

      - name: Upload ARM64 AppImage
        uses: actions/upload-artifact@v4
        with:
          name: wubi-typemaster-arm64-appimage
          path: release/**/*.AppImage
          retention-days: 90
