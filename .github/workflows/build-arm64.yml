name: Build ARM64

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to build'
        required: false
        default: 'main'
        type: string
  push:
    branches:
      - 'ci/arm64/**'

jobs:
  build-arm64:
    name: Build ARM64 (deb + AppImage)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Debug system info
        run: |
          echo "=== System Info ==="
          uname -a
          arch
          node -v
          npm -v
          echo "=== CPU ==="
          cat /proc/cpuinfo | grep "model name" | head -1 || true
          cat /proc/cpuinfo | grep "CPU architecture" | head -1 || true
          echo "=== Memory ==="
          free -h
          echo "=== Disk ==="
          df -h / | tail -1

      - run: npm install -g pnpm@9

      - run: pnpm install

      - name: Rebuild native modules for Electron
        run: |
          npx @electron/rebuild -f -w better-sqlite3

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev fakeroot libfuse2
          sudo apt-get install -y -qq libx11-xcb1 libxcb-dri3-0 libdrm2 libgbm1 libasound2 || true

      - name: Build & Package (ARM64)
        shell: bash
        env:
          ELECTRON_MIRROR: ""
          ELECTRON_BUILDER_BINARIES_MIRROR: ""
          NODE_OPTIONS: ""
        run: |
          set -x
          echo "npmrc electron_mirror: $(npm config get electron_mirror 2>/dev/null || echo 'not set')"
          echo "env ELECTRON_MIRROR: ${ELECTRON_MIRROR:-not set}"
          pnpm build 2>&1 | tee /tmp/build.log
          echo "=== out/ directory ===" | tee -a /tmp/build.log
          ls -la out/ 2>&1 | tee -a /tmp/build.log
          echo "=== electron-builder version ===" | tee -a /tmp/build.log
          npx electron-builder --version 2>&1 | tee -a /tmp/build.log
          echo "=== Starting ARM64 packaging ===" | tee -a /tmp/build.log
          npx electron-builder --linux --arm64 --verbose > /tmp/ebuilder.log 2>&1
          EXIT_CODE=$?
          echo "=== electron-builder exit code: $EXIT_CODE ===" | tee -a /tmp/build.log
          cat /tmp/ebuilder.log | tee -a /tmp/build.log
          echo "=== BUILD_LOG_START ===" | tee -a /tmp/build.log
          cat /tmp/build.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          exit $EXIT_CODE

      - name: List built artifacts
        run: |
          echo "=== Built artifacts ==="
          find release -type f 2>/dev/null | sort || echo "No artifacts found"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 90

      - name: Report failure as issue
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          {
            echo "### ARM64 Build Failure ($TIMESTAMP)"
            echo ""
            echo "**Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "**SHA**: ${{ github.sha }}"
            echo ""
            echo '```'
            head -200 /tmp/build.log 2>/dev/null || echo "Log file not found"
            echo '```'
          } > /tmp/issue_body.md
          gh label create ci-log --repo "${{ github.repository }}" 2>/dev/null || true
          gh issue create \
            --title "CI: ARM64 build failed ($TIMESTAMP)" \
            --label "ci-log" \
            --body-file /tmp/issue_body.md \
            --repo "${{ github.repository }}" 2>&1 || echo "Issue creation failed"

      - name: Upload ARM64 deb
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wubi-typemaster-arm64-deb
          path: release/**/*.deb
          retention-days: 90

      - name: Upload ARM64 AppImage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wubi-typemaster-arm64-appimage
          path: release/**/*.AppImage
          retention-days: 90
