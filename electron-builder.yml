{
  "$schema": "https://json.schemastore.org/electron-builder",
  "appId": "cc.wubi.typemaster",
  "productName": "WubiTypeMaster",
  "copyright": "Copyright © 2026 benber66",
  "directories": {
    "output": "release/${version}",
    "buildResources": "build"
  },
  "files": [
    "out/**/*",
    "package.json"
  ],
  "extraResources": [
    {
      "from": "src/data",
      "to": "data",
      "filter": ["**/*.json", "**/*.yaml", "**/*.md"]
    }
  ],
  "extraMetadata": {
    "main": "./out/main/index.js"
  },
  "win": {
    "target": [
      { "target": "nsis", "arch": ["x64"] },
      { "target": "portable", "arch": ["x64"] }
    ],
    "artifactName": "${productName}-${version}-${arch}-setup.${ext}",
    "publisherName": "benber66"
  },
  "nsis": {
    "oneClick": false,
    "perMachine": false,
    "allowElevation": true,
    "allowToChangeInstallationDirectory": true,
    "createDesktopShortcut": true,
    "createStartMenuShortcut": true,
    "shortcutName": "WubiTypeMaster"
  },
  "linux": {
    "target": [
      { "target": "AppImage", "arch": ["x64"] },
      { "target": "deb", "arch": ["x64"] }
    ],
    "category": "Education",
    "icon": "build/icon.png",
    "artifactName": "${productName}-${version}-${arch}.${ext}"
  },
  "mac": {
    "target": ["dmg"],
    "category": "public.app-category.education"
  },
  "publish": [
    {
      "provider": "generic",
      "url": "https://gitee.com/benber66/wubi-typemaster/releases/download/${version}",
      "channel": "latest"
    }
  ],
  "asarUnpack": [
    "**/node_modules/better-sqlite3/**",
    "**/node_modules/bindings/**",
    "**/node_modules/file-uri-to-path/**"
  ]
}
